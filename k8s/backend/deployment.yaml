apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: cicd-dashboard
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
        app.kubernetes.io/name: backend
        app.kubernetes.io/component: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: backend
          image: cicd-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
              name: http
          env:
            # Non-sensitive config from ConfigMap
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: cicd-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: cicd-config
                  key: POSTGRES_PORT
            - name: SYNC_INTERVAL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: cicd-config
                  key: SYNC_INTERVAL_SECONDS
            - name: CACHE_TTL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: cicd-config
                  key: CACHE_TTL_SECONDS
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: cicd-config
                  key: DEBUG
            # Sensitive config from Secrets
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: cicd-db-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: cicd-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cicd-db-secret
                  key: POSTGRES_PASSWORD
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cicd-app-secret
                  key: GITHUB_TOKEN
                  optional: true
            - name: GITHUB_OWNER
              valueFrom:
                secretKeyRef:
                  name: cicd-app-secret
                  key: GITHUB_OWNER
                  optional: true
            - name: GITHUB_REPO
              valueFrom:
                secretKeyRef:
                  name: cicd-app-secret
                  key: GITHUB_REPO
                  optional: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/ping
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
