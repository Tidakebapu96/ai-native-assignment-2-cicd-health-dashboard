apiVersion: v1
kind: ConfigMap
metadata:
  name: cicd-config
  namespace: cicd-dashboard
  labels:
    app.kubernetes.io/name: cicd-dashboard
    app.kubernetes.io/component: config
data:
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  SYNC_INTERVAL_SECONDS: "300"
  CACHE_TTL_SECONDS: "300"
  DEBUG: "false"
  APP_NAME: "CI/CD Pipeline Health Dashboard"
  APP_VERSION: "1.0.0"
